name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  ci:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    # Hanya deploy jika push langsung ke main (bukan dari PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # Timeout per command (detik)
          command_timeout: 15m
          script: |
            set -e

            cd ~/calora

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building Docker images..."
            docker compose build

            echo "==> Running database migrations..."
            # Remove old migrate container so it always re-runs on every deploy
            docker compose rm -f migrate 2>/dev/null || true
            docker compose run --rm migrate
            echo "==> Migrations complete."

            echo "==> Restarting services..."
            docker compose up -d

            echo "==> Waiting for services to become healthy..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' calora-web-1 2>/dev/null || echo "not found")
              echo "  web status: $STATUS (attempt $i/12)"
              [ "$STATUS" = "healthy" ] && break
              sleep 10
            done

            echo "==> Health check..."
            docker compose ps
            WEB_PORT=$(grep WEB_PORT .env 2>/dev/null | cut -d= -f2 || echo "80")
            curl -sf http://localhost:${WEB_PORT}/ || (echo "Health check failed!" && exit 1)

            echo "==> Cleaning up unused Docker resources..."
            docker system prune -f

            echo "==> Deploy complete!"
